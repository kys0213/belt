name: Release

on:
  # Called by release-please.yml after it creates a tag + GitHub Release.
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  # Manual recovery: build + upload assets for an existing tag.
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name (e.g. v0.1.5)'
        required: true
        type: string
  # Safety net: any `v*` tag push triggers a build, so tags created outside
  # release-please (manual backfill, recovery) still produce binaries.
  push:
    tags:
      - 'v*'

# Prevent two builds racing for the same tag (e.g. workflow_call + push.tags).
concurrency:
  group: release-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C ~/.cargo/bin

      - name: Build binary
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} --package belt-cli
          else
            cargo build --release --target ${{ matrix.target }} --package belt-cli
          fi
        shell: bash

      # Runs on natively-executable targets only: cross builds (aarch64 Linux on x64
      # Linux runner) and x86_64-apple-darwin (macos-latest is arm64; Rosetta presence
      # is not contractual) are skipped. Verifies both that the binary runs and that
      # it reports the same version as the tag being released.
      - name: Smoke test binary
        if: matrix.cross != true && matrix.target != 'x86_64-apple-darwin'
        shell: bash
        run: |
          expected="${{ inputs.tag_name || github.ref_name }}"
          expected="${expected#v}"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            bin="./target/${{ matrix.target }}/release/belt.exe"
          else
            bin="./target/${{ matrix.target }}/release/belt"
          fi
          out=$("$bin" --version 2>&1)
          echo "Binary reports: $out"
          actual=$(printf '%s' "$out" | awk '{print $NF}')
          if [ "$actual" != "$expected" ]; then
            echo "::error::Binary version '$actual' does not match tag '$expected'"
            exit 1
          fi
          echo "Smoke test OK: binary version matches tag ($expected)"

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../belt-${{ matrix.target }}.tar.gz belt
        shell: bash

      - name: Package (zip)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../belt-${{ matrix.target }}.zip belt.exe
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: belt-${{ matrix.target }}
          path: belt-${{ matrix.target }}.${{ matrix.archive }}

  upload:
    name: Upload Release Assets
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: artifacts/*
